<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hasta La Vista Franck 👋</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0c0a;
      --surface: #1a1714;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: #7a6330;
      --text: #f0ead8;
      --text-muted: #9a8f7a;
      --border: #2e2820;
      --slide-w: min(900px, 96vw);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.4;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 60px 20px 40px;
      position: relative;
    }

    .hero::after {
      content: '';
      display: block;
      width: 120px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 24px auto 0;
    }

    .hero-tag {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
      font-weight: 500;
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      font-weight: 700;
      line-height: 1.1;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dim) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .hero-sub {
      color: var(--text-muted);
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.5px;
    }

    /* Slide counter */
    .counter {
      text-align: center;
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 1px;
    }
    .counter span {
      color: var(--gold);
      font-weight: 500;
    }

    /* Main viewer */
    .viewer {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 0 12px 10px;
    }

    .slide-wrapper {
      width: var(--slide-w);
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px var(--border),
        0 20px 60px rgba(0,0,0,0.7),
        0 0 40px rgba(201,168,76,0.06);
      background: #111;
    }

    .slide-wrapper img {
      display: block;
      width: 100%;
      height: auto;
      transition: opacity 0.3s ease;
    }

    .slide-wrapper img.loading {
      opacity: 0;
    }

    /* Nav buttons */
    .nav-btn {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--gold-dim);
      background: rgba(201,168,76,0.08);
      color: var(--gold);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .nav-btn:hover:not(:disabled) {
      background: rgba(201,168,76,0.18);
      border-color: var(--gold);
      transform: scale(1.08);
    }
    .nav-btn:disabled {
      opacity: 0.25;
      cursor: not-allowed;
    }

    /* Progress bar */
    .progress-bar {
      width: var(--slide-w);
      margin: 0 auto 24px;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold-dim), var(--gold));
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    /* Thumbnail strip */
    .thumb-section {
      width: 100%;
      max-width: calc(var(--slide-w) + 120px);
      margin: 0 auto 16px;
      padding: 0 12px;
    }

    .thumb-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 10px;
      padding-left: 4px;
    }

    .thumb-strip {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 8px;
      scrollbar-width: thin;
      scrollbar-color: var(--gold-dim) transparent;
    }
    .thumb-strip::-webkit-scrollbar { height: 3px; }
    .thumb-strip::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

    .thumb {
      flex-shrink: 0;
      width: 72px;
      height: 48px;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.18s;
      opacity: 0.55;
    }
    .thumb:hover { opacity: 0.85; }
    .thumb.active {
      border-color: var(--gold);
      opacity: 1;
      box-shadow: 0 0 12px rgba(201,168,76,0.3);
    }
    .thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Keyboard hint */
    .hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      padding-bottom: 40px;
      letter-spacing: 0.5px;
    }
    .hint kbd {
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 10px;
      font-family: monospace;
      color: var(--gold-dim);
    }

    /* Fullscreen overlay */
    .fs-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.96);
      z-index: 9000;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    .fs-overlay.open { display: flex; }
    .fs-overlay img {
      max-width: 95vw;
      max-height: 95vh;
      object-fit: contain;
      border-radius: 6px;
    }
    .fs-close {
      position: fixed;
      top: 16px;
      right: 20px;
      color: var(--text-muted);
      font-size: 28px;
      cursor: pointer;
      line-height: 1;
      z-index: 9001;
    }
    .fs-close:hover { color: var(--text); }

    /* Zoom hint on slide */
    .zoom-hint {
      position: absolute;
      bottom: 10px;
      right: 12px;
      background: rgba(0,0,0,0.55);
      color: var(--text-muted);
      font-size: 10px;
      padding: 4px 8px;
      border-radius: 4px;
      pointer-events: none;
      letter-spacing: 0.5px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .slide-wrapper:hover .zoom-hint { opacity: 1; }

    /* Touch swipe area */
    .slide-wrapper { cursor: zoom-in; }
  </style>
</head>
<body>

  <div class="hero">
    <p class="hero-tag">Livre d'or · Randstad Solutions Clients</p>
    <h1>Hasta La Vista, Franck 👋</h1>
    <p class="hero-sub">Les mots de tes collègues pour une belle nouvelle aventure</p>
  </div>

  <div class="counter">Diapo <span id="cur">1</span> sur <span id="total">69</span></div>

  <div class="viewer">
    <button class="nav-btn" id="prev" title="Précédent">&#8592;</button>
    <div class="slide-wrapper" id="slide-wrapper">
      <img id="main-img" src="slide-01.jpg" alt="Slide 1" />
      <div class="zoom-hint">🔍 Cliquer pour agrandir</div>
    </div>
    <button class="nav-btn" id="next" title="Suivant">&#8594;</button>
  </div>

  <div style="width:var(--slide-w);margin:10px auto 0;padding:0 12px;">
    <div class="progress-bar">
      <div class="progress-fill" id="progress" style="width:1.45%"></div>
    </div>
  </div>

  <div class="thumb-section">
    <div class="thumb-label">Toutes les diapos</div>
    <div class="thumb-strip" id="thumb-strip"></div>
  </div>

  <p class="hint">
    Naviguer avec <kbd>←</kbd> <kbd>→</kbd> &nbsp;·&nbsp; <kbd>Espace</kbd> pour suivant &nbsp;·&nbsp; cliquer sur la diapo pour agrandir
  </p>

  <!-- Fullscreen overlay -->
  <div class="fs-overlay" id="fs-overlay">
    <span class="fs-close" id="fs-close">×</span>
    <img id="fs-img" src="" alt="" />
  </div>

  <script>
    const TOTAL = 69;
    let current = 1;

    const mainImg = document.getElementById('main-img');
    const curEl = document.getElementById('cur');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const progress = document.getElementById('progress');
    const thumbStrip = document.getElementById('thumb-strip');
    const fsOverlay = document.getElementById('fs-overlay');
    const fsImg = document.getElementById('fs-img');
    const slideWrapper = document.getElementById('slide-wrapper');

    // Build thumbnails
    for (let i = 1; i <= TOTAL; i++) {
      const div = document.createElement('div');
      div.className = 'thumb' + (i === 1 ? ' active' : '');
      div.dataset.n = i;
      const img = document.createElement('img');
      img.src = `slide-${String(i).padStart(2,'0')}.jpg`;
      img.alt = `Slide ${i}`;
      img.loading = 'lazy';
      div.appendChild(img);
      div.addEventListener('click', () => goTo(i));
      thumbStrip.appendChild(div);
    }

    function goTo(n) {
      if (n < 1 || n > TOTAL) return;
      current = n;
      const src = `slide-${String(n).padStart(2,'0')}.jpg`;
      mainImg.classList.add('loading');
      mainImg.onload = () => mainImg.classList.remove('loading');
      mainImg.src = src;
      mainImg.alt = `Slide ${n}`;
      curEl.textContent = n;
      prevBtn.disabled = n === 1;
      nextBtn.disabled = n === TOTAL;
      progress.style.width = ((n / TOTAL) * 100) + '%';
      // Update thumbnails
      document.querySelectorAll('.thumb').forEach(t => {
        t.classList.toggle('active', +t.dataset.n === n);
      });
      // Scroll active thumb into view
      const activeThumb = thumbStrip.querySelector('.thumb.active');
      if (activeThumb) activeThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }

    prevBtn.addEventListener('click', () => goTo(current - 1));
    nextBtn.addEventListener('click', () => goTo(current + 1));
    prevBtn.disabled = true;

    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goTo(current + 1); }
      if (e.key === 'ArrowLeft') goTo(current - 1);
      if (e.key === 'Escape') closeFull();
    });

    // Touch swipe
    let touchStart = null;
    slideWrapper.addEventListener('touchstart', e => { touchStart = e.changedTouches[0].clientX; }, { passive: true });
    slideWrapper.addEventListener('touchend', e => {
      if (touchStart === null) return;
      const dx = e.changedTouches[0].clientX - touchStart;
      if (Math.abs(dx) > 40) dx < 0 ? goTo(current + 1) : goTo(current - 1);
      touchStart = null;
    });

    // Fullscreen
    slideWrapper.addEventListener('click', () => {
      fsImg.src = mainImg.src;
      fsOverlay.classList.add('open');
    });
    document.getElementById('fs-close').addEventListener('click', closeFull);
    fsOverlay.addEventListener('click', e => { if (e.target === fsOverlay || e.target === fsImg) closeFull(); });
    function closeFull() { fsOverlay.classList.remove('open'); }

    // Preload adjacent slides
    function preload(n) {
      [n-1, n+1].forEach(i => {
        if (i >= 1 && i <= TOTAL) {
          const img = new Image();
          img.src = `slide-${String(i).padStart(2,'0')}.jpg`;
        }
      });
    }
    mainImg.addEventListener('load', () => preload(current));
    preload(1);
  </script>
</body>
</html>
