<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hasta La Vista Franck 👋</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0c0a; --surface: #141210; --surface2: #1a1714;
      --gold: #c9a84c; --gold-light: #e8c97a; --gold-dim: #7a6330;
      --border: #2a2520; --text: #f0ead8; --text-muted: #9a8f7a; --text-dim: #5a5045;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    .app { display: flex; flex: 1; overflow: hidden; }

    .sidebar { width: 240px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: transform 0.3s ease; }
    .sidebar-header { padding: 20px 16px 16px; border-bottom: 1px solid var(--border); }
    .sidebar-tag { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); font-weight: 500; margin-bottom: 6px; }
    .sidebar-name { font-family: 'Playfair Display', serif; font-size: 16px; color: var(--text); line-height: 1.3; }

    .sections { flex: 1; overflow-y: auto; padding: 10px 0; }
    .sections::-webkit-scrollbar { width: 3px; }
    .sections::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 2px; }

    .section-btn { width: 100%; padding: 10px 16px; background: transparent; border: none; border-left: 3px solid transparent; cursor: pointer; text-align: left; transition: all 0.15s; }
    .section-btn:hover { background: var(--surface2); }
    .section-btn.active { border-left-color: var(--gold); background: var(--surface2); }
    .section-emoji { font-size: 16px; }
    .section-label { font-size: 13px; font-weight: 500; color: var(--text); margin-top: 2px; }
    .section-range { font-size: 11px; color: var(--text-dim); margin-top: 1px; }

    .thumb-area { border-top: 1px solid var(--border); padding: 10px 10px 12px; }
    .thumb-area-label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 7px; padding-left: 2px; }
    .thumb-row { display: flex; gap: 5px; flex-wrap: wrap; }
    .thumb { width: 36px; height: 24px; border-radius: 3px; overflow: hidden; cursor: pointer; border: 1.5px solid transparent; opacity: 0.5; transition: all 0.15s; flex-shrink: 0; }
    .thumb:hover { opacity: 0.8; }
    .thumb.active { border-color: var(--gold); opacity: 1; }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
    .topbar { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-shrink: 0; }
    .burger { display: none; background: transparent; border: 1px solid var(--border); color: var(--gold); border-radius: 6px; width: 32px; height: 32px; font-size: 16px; cursor: pointer; align-items: center; justify-content: center; flex-shrink: 0; }
    .topbar-section { font-size: 12px; color: var(--gold); letter-spacing: 0.5px; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .topbar-counter { font-size: 12px; color: var(--text-dim); flex-shrink: 0; }

    .slide-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 16px; overflow: hidden; }
    .slide-wrapper { position: relative; max-width: 100%; max-height: 100%; border-radius: 6px; overflow: hidden; box-shadow: 0 0 0 1px var(--border), 0 20px 60px rgba(0,0,0,0.6); cursor: zoom-in; }
    .slide-wrapper img { display: block; max-width: 100%; max-height: calc(100vh - 200px); width: auto; height: auto; transition: opacity 0.25s; }
    .slide-wrapper img.loading { opacity: 0; }
    .zoom-hint { position: absolute; bottom: 8px; right: 10px; background: rgba(0,0,0,0.55); color: var(--text-muted); font-size: 10px; padding: 3px 7px; border-radius: 4px; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    .slide-wrapper:hover .zoom-hint { opacity: 1; }

    .nav-bar { padding: 10px 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .nav-btn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--gold-dim); background: rgba(201,168,76,0.06); color: var(--gold); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.18s; flex-shrink: 0; }
    .nav-btn:hover:not(:disabled) { background: rgba(201,168,76,0.15); border-color: var(--gold); }
    .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }
    .progress-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold-dim), var(--gold)); border-radius: 2px; transition: width 0.3s ease; }
    .hint-text { font-size: 11px; color: var(--text-dim); flex-shrink: 0; white-space: nowrap; }

    .fs-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 9000; align-items: center; justify-content: center; }
    .fs-overlay.open { display: flex; }
    .fs-overlay img { max-width: 95vw; max-height: 95vh; object-fit: contain; border-radius: 4px; cursor: zoom-out; }
    .fs-close { position: fixed; top: 14px; right: 18px; color: var(--text-muted); font-size: 32px; cursor: pointer; line-height: 1; z-index: 9001; }
    .fs-close:hover { color: var(--text); }
    .fs-nav { position: fixed; top: 50%; transform: translateY(-50%); background: rgba(201,168,76,0.1); border: 1px solid var(--gold-dim); color: var(--gold); font-size: 22px; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 9001; }
    .fs-nav:hover { background: rgba(201,168,76,0.2); }
    .fs-nav.left { left: 16px; }
    .fs-nav.right { right: 16px; }
    .fs-counter { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); font-size: 12px; color: var(--text-dim); z-index: 9001; }

    @media (max-width: 640px) {
      .sidebar { position: fixed; top: 0; left: 0; bottom: 0; z-index: 500; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .burger { display: flex; }
      .hint-text { display: none; }
      .mob-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 499; }
      .mob-overlay.open { display: block; }
    }
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-tag">Livre d'or · Randstad</div>
      <div class="sidebar-name">Hasta La Vista,<br>Franck 👋</div>
    </div>
    <div class="sections" id="sections"></div>
    <div class="thumb-area">
      <div class="thumb-area-label">Slides de la section</div>
      <div class="thumb-row" id="thumb-row"></div>
    </div>
  </aside>

  <div class="mob-overlay" id="mob-overlay"></div>

  <div class="main">
    <div class="topbar">
      <button class="burger" id="burger">☰</button>
      <span class="topbar-section" id="topbar-section"></span>
      <span class="topbar-counter" id="topbar-counter"></span>
    </div>
    <div class="slide-area">
      <div class="slide-wrapper" id="slide-wrapper">
        <img id="main-img" src="slide-01.jpg" alt="Slide 1" />
        <div class="zoom-hint">🔍 Cliquer pour agrandir</div>
      </div>
    </div>
    <div class="nav-bar">
      <button class="nav-btn" id="prev" disabled>&#8592;</button>
      <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
      <button class="nav-btn" id="next">&#8594;</button>
      <span class="hint-text" id="hint-text"></span>
    </div>
  </div>
</div>

<div class="fs-overlay" id="fs-overlay">
  <span class="fs-close" id="fs-close">×</span>
  <button class="fs-nav left" id="fs-prev">&#8592;</button>
  <img id="fs-img" src="" alt="" />
  <button class="fs-nav right" id="fs-next">&#8594;</button>
  <span class="fs-counter" id="fs-counter"></span>
</div>

<script>
  const TOTAL = 69;
  const SECTIONS = [
    { emoji: '🎬', label: 'Intro',       range: 'Slides 1–4',   from: 1,  to: 4  },
    { emoji: '💌', label: 'Hommages',    range: 'Slides 5–47',  from: 5,  to: 47 },
    { emoji: '😂', label: 'Galerie fun', range: 'Slides 48–67', from: 48, to: 67 },
    { emoji: '🎤', label: 'Au revoir',   range: 'Slides 68–69', from: 68, to: 69 },
  ];
  let current = 1;

  const mainImg   = document.getElementById('main-img');
  const prevBtn   = document.getElementById('prev');
  const nextBtn   = document.getElementById('next');
  const progress  = document.getElementById('progress');
  const thumbRow  = document.getElementById('thumb-row');
  const sectionsEl= document.getElementById('sections');
  const topbarSec = document.getElementById('topbar-section');
  const topbarCnt = document.getElementById('topbar-counter');
  const hintText  = document.getElementById('hint-text');
  const fsOverlay = document.getElementById('fs-overlay');
  const fsImg     = document.getElementById('fs-img');
  const fsCtr     = document.getElementById('fs-counter');
  const slideWrap = document.getElementById('slide-wrapper');
  const sidebar   = document.getElementById('sidebar');
  const burger    = document.getElementById('burger');
  const mobOverlay= document.getElementById('mob-overlay');

  const pad = n => String(n).padStart(2,'0');
  const src = n => `slide-${pad(n)}.jpg`;
  const curSec = () => SECTIONS.find(s => current >= s.from && current <= s.to) || SECTIONS[0];

  SECTIONS.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'section-btn';
    btn.dataset.idx = i;
    btn.innerHTML = `<div class="section-emoji">${s.emoji}</div><div class="section-label">${s.label}</div><div class="section-range">${s.range}</div>`;
    btn.addEventListener('click', () => { goTo(s.from); closeSidebar(); });
    sectionsEl.appendChild(btn);
  });

  function updateSidebarActive() {
    document.querySelectorAll('.section-btn').forEach((btn, i) => btn.classList.toggle('active', SECTIONS[i] === curSec()));
  }

  let lastSecFrom = -1;
  function updateThumbs() {
    const sec = curSec();
    if (sec.from !== lastSecFrom) {
      lastSecFrom = sec.from;
      thumbRow.innerHTML = '';
      const max = Math.min(sec.to, sec.from + 11);
      for (let i = sec.from; i <= max; i++) {
        const div = document.createElement('div');
        div.className = 'thumb';
        div.dataset.n = i;
        const img = document.createElement('img');
        img.src = src(i); img.loading = 'lazy';
        div.appendChild(img);
        div.addEventListener('click', () => goTo(i));
        thumbRow.appendChild(div);
      }
    }
    thumbRow.querySelectorAll('.thumb').forEach(t => t.classList.toggle('active', +t.dataset.n === current));
    const active = thumbRow.querySelector('.thumb.active');
    if (active) active.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
  }

  function goTo(n) {
    if (n < 1 || n > TOTAL) return;
    current = n;
    mainImg.classList.add('loading');
    mainImg.onload = () => mainImg.classList.remove('loading');
    mainImg.src = src(n);
    mainImg.alt = `Slide ${n}`;
    prevBtn.disabled = n === 1;
    nextBtn.disabled = n === TOTAL;
    progress.style.width = ((n / TOTAL) * 100) + '%';
    const sec = curSec();
    topbarSec.textContent = `${sec.emoji} ${sec.label}`;
    topbarCnt.textContent = `${n} / ${TOTAL}`;
    hintText.textContent = `${n - sec.from + 1} / ${sec.to - sec.from + 1} dans cette section`;
    updateSidebarActive();
    updateThumbs();
    [n+1, n+2].forEach(i => { if (i <= TOTAL) { const img = new Image(); img.src = src(i); } });
  }

  prevBtn.addEventListener('click', () => goTo(current - 1));
  nextBtn.addEventListener('click', () => goTo(current + 1));

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') { closeFs(); return; }
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); goTo(current + 1); if (fsOverlay.classList.contains('open')) { fsImg.src = src(current); fsCtr.textContent = `${current} / ${TOTAL}`; } }
    if (e.key === 'ArrowLeft') { goTo(current - 1); if (fsOverlay.classList.contains('open')) { fsImg.src = src(current); fsCtr.textContent = `${current} / ${TOTAL}`; } }
  });

  let touchX = null;
  slideWrap.addEventListener('touchstart', e => { touchX = e.changedTouches[0].clientX; }, { passive: true });
  slideWrap.addEventListener('touchend', e => {
    if (touchX === null) return;
    const dx = e.changedTouches[0].clientX - touchX;
    if (Math.abs(dx) > 40) dx < 0 ? goTo(current + 1) : goTo(current - 1);
    touchX = null;
  });

  slideWrap.addEventListener('click', () => { fsImg.src = src(current); fsCtr.textContent = `${current} / ${TOTAL}`; fsOverlay.classList.add('open'); });
  document.getElementById('fs-close').addEventListener('click', closeFs);
  fsOverlay.addEventListener('click', e => { if (e.target === fsOverlay) closeFs(); });
  document.getElementById('fs-prev').addEventListener('click', e => { e.stopPropagation(); goTo(current - 1); fsImg.src = src(current); fsCtr.textContent = `${current} / ${TOTAL}`; });
  document.getElementById('fs-next').addEventListener('click', e => { e.stopPropagation(); goTo(current + 1); fsImg.src = src(current); fsCtr.textContent = `${current} / ${TOTAL}`; });
  function closeFs() { fsOverlay.classList.remove('open'); }

  burger.addEventListener('click', () => { sidebar.classList.add('open'); mobOverlay.classList.add('open'); });
  mobOverlay.addEventListener('click', closeSidebar);
  function closeSidebar() { sidebar.classList.remove('open'); mobOverlay.classList.remove('open'); }

  goTo(1);
</script>
</body>
</html>
